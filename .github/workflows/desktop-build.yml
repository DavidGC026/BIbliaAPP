# Compila BibliaAPP Desktop en Linux y Windows.
# Artefactos: AppImage, .deb, .msi, .exe (NSIS)
# Release automático (draft) al pushear tag desktop-v* (ej. desktop-v0.2.0)

name: Desktop Build

on:
  push:
    tags:
      - "desktop-v*"
    branches:
      - main
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            bundles: appimage,deb
          - platform: windows
            os: windows-latest
            bundles: msi,nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Generate icons
        working-directory: desktop
        run: npm run icons

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: desktop-v__VERSION__
          releaseName: BibliaAPP Desktop v__VERSION__
          releaseBody: |
            Builds automáticos de BibliaAPP Desktop.
            Changelog: desktop/docs/01-changelog.md
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}

      - name: Build Arch pacman package (Linux only)
        if: matrix.platform == 'linux'
        working-directory: desktop
        run: ./packaging/arch/build-pacman-pkg.sh

      - name: Upload pacman artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: pacman-x86_64
          path: desktop/packaging/arch/bibliaapp-desktop-*-x86_64.pkg.tar.zst
          if-no-files-found: error
